name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "global.json"
      - "Directory.Packages.props"
      - "justfile"
      - "**/packages.lock.json"
      - "**/*.csproj"
      - "**/*.props"
      - "**/*.targets"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "global.json"
      - "Directory.Packages.props"
      - "justfile"
      - "**/packages.lock.json"
      - "**/*.csproj"
      - "**/*.props"
      - "**/*.targets"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup dotnet sdk
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: setup just
        uses: extractions/setup-just@v4

      - name: restore
        run: just restore
